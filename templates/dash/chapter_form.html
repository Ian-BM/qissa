{% extends "base.html" %}
{% block content %}

<h2>
  {% if mode == "create" %}Ongeza Sura{% else %}Hariri Sura{% endif %}
  — {{ story.title }}
</h2>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">
    {% if mode == "create" %}Unda{% else %}Hifadhi{% endif %}
  </button>
</form>

{% endblock %}
