<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Qissa{% endblock %}</title>

  {% load static %}

 <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --line: #e5e7eb;
    --brand: #0f172a;
    --brand-soft: #1e293b;
  }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #f8faff 0%, var(--bg) 100%);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  a { text-decoration: none; color: inherit; }

  header {
    background: rgba(15, 23, 42, 0.96);
    color: #ffffff;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
  }

  .nav-inner {
    max-width: 1140px;
    margin: 0 auto;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.2px;
    color: #fff;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 14px;
  }

  .nav-link {
    color: #d1d5db;
    font-weight: 500;
    padding: 8px 10px;
    border-radius: 8px;
    transition: all .2s ease;
  }

  .nav-link:hover { color: #fff; background: rgba(255,255,255,.08); }

  .logout-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,.25);
    color: #e5e7eb;
    border-radius: 8px;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    padding: 8px 12px;
    transition: all .2s ease;
  }

  .logout-btn:hover { background: rgba(255,255,255,.08); color: #fff; }

  main {
    flex: 1;
    max-width: 1140px;
    margin: 0 auto;
    padding: 44px 20px;
    width: 100%;
  }

  .btn-primary,
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
  }

  .btn-primary {
    background: var(--brand);
    border: 1px solid var(--brand);
    color: #fff;
  }

  .btn-primary:hover { background: var(--brand-soft); border-color: var(--brand-soft); }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text);
  }

  .btn-secondary:hover { background: #f8fafc; }

  footer {
    background: #0f172a;
    color: #9ca3af;
    padding: 18px 20px;
    font-size: 13px;
    border-top: 1px solid rgba(255,255,255,.05);
  }

  .footer-inner { max-width: 1140px; margin: 0 auto; text-align: center; }

  @media (max-width: 768px) {
    .nav-inner { flex-direction: column; align-items: flex-start; }
    .nav-links { width: 100%; flex-wrap: wrap; }
    main { padding: 32px 16px; }
  }
</style>

</head>

<body>

  <header>
    <div class="nav-inner">
      <a href="{% url 'home' %}" class="logo">Qissa</a>

      <nav class="nav-links">
        {% if user.is_staff %}
          <a href="{% url 'dashboard_home' %}" class="nav-link">Dashboard</a>
        {% endif %}

        {% if user.is_authenticated %}
          <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="nav-link">Login</a>
          <a href="{% url 'register' %}" class="nav-link">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="footer-inner">
      © {{ now.year }} Qissa. All rights reserved.
    </div>
  </footer>

</body>
</html>
