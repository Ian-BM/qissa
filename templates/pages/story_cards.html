<a href="{% url 'story_detail' story.slug %}" class="story-card">
  <style>
    .story-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      width: 100px;
      max-width: 100px;
      min-height: 300px;
      background: #fff;
      border-width: 0;
      border-style: solid;
      border-color: white;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: #111;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .story-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
    }

    .story-cover {
      width: 100%;
      height: 120px;
      overflow: hidden;
      background: #f1f1f1;
    }

    .story-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f3f3f3, #e9e9e9);
    }

    .story-info {
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      flex: 1;
      text-align: center;
      gap: 4px;
    }

    .story-info h3 {
      font-size: 0.85rem;
      margin: 0;
      line-height: 1.2;
      min-height: 2.4em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .story-info p {
      display: none;
    }

    .story-info span {
      font-size: 0.85rem;
      color: #656d7a;
    }
  </style>

  <div class="story-cover">
    {% if story.cover %}
      <img src="{{ story.cover.url }}" alt="{{ story.title }}">
    {% else %}
      <div class="cover-placeholder"></div>
    {% endif %}
  </div>

  <div class="story-info">
    <h3>{{ story.title }}</h3>
    <p>{{ story.description|truncatechars:80 }}</p>
    <span>{{ story.views }} reads</span>
  </div>
</a>
