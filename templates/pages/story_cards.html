<a href="{% url 'story_detail' story.slug %}" class="story-card">
  <style>
    .story-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      width: 124px;
      max-width: 124px;
      min-height: 0;
      background: var(--surface);
      border-width: 1px;
      border-style: solid;
      border-color: var(--border);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: var(--heading);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .story-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
    }

    .story-cover {
      width: 100%;
      height: 164px;
      overflow: hidden;
      background: var(--surface-soft);
    }

    .story-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--surface-soft), var(--tag-bg));
    }

    .story-info {
      width: 100%;
      padding: 8px 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      gap: 2px;
    }

    .story-info h3 {
      font-size: 0.85rem;
      margin: 0;
      line-height: 1.2;
      min-height: 2.2em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .story-info p {
      display: none;
    }

    .story-info span {
      font-size: 0.85rem;
      color: var(--text);
      padding-bottom: 4px;
    }
    .story-like {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .story-like-heart {
      display: inline-block;
      animation: story-like-pop 1.25s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes story-like-pop {
      0%, 100% { transform: scale(1); }
      45% { transform: scale(1.2); }
    }
  </style>

  <div class="story-cover">
    {% if story.cover %}
      <img src="{{ story.cover.url }}" alt="{{ story.title }}">
    {% else %}
      <div class="cover-placeholder"></div>
    {% endif %}
  </div>

  <div class="story-info">
    <h3>{{ story.title }}</h3>
    <p>{{ story.description|truncatechars:80 }}</p>
    <span><span class="story-like"><span class="story-like-heart" aria-hidden="true">❤</span>{{ story.likes_count|default:0 }}</span>{% if user.is_staff %} · 👁 {{ story.views }}{% endif %}</span>
  </div>
</a>
